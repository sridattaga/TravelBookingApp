apiVersion: apps/v1
kind: Deployment
metadata:
  name: travelbooking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: travelbooking
  template:
    metadata:
      labels:
        app: travelbooking
    spec:
      containers:
      - name: travelbooking
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 80
